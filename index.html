<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hey Dina... 💛</title>
  <meta name="description" content="A special message for someone very special.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💛</text></svg>">
</head>

<body>

  <!-- Floating Particles -->
  <div class="particles-container"></div>

  <!-- Page Transition -->
  <div class="page-transition-overlay"></div>

  <!-- Main Content -->
  <div class="page-container">

    <!-- Typewriter Heading -->
    <h1 id="typewriter-text" class="typewriter-cursor" data-text="Hey Dina...">
    </h1>

    <!-- Subtitle (hidden until typewriter finishes) -->
    <p class="landing-subtitle subtitle" style="opacity: 0;">
      I have something important to tell you 💛
    </p>

    <!-- Hero Image -->
    <img src="img/sorry_character.png" alt="Sorry Bear" class="hero-image" style="opacity: 0;">

    <!-- Buttons -->
    <div class="landing-buttons" style="opacity: 0;">
      <div class="spacer-md"></div>
      <a href="#" id="btn-yes" class="btn btn-primary pulse-glow">
        Let me explain 💛
      </a>
      <div class="spacer-sm"></div>
      <a href="#" id="btn-no" class="btn btn-secondary btn-small">
        No 😤
      </a>
    </div>

  </div>

  <script src="js/main.js"></script>
  <script src="js/landing.js"></script>
</body>

</html>
